<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="left-section">
            <h1>Stackly Foodie</h1>
            <h2>Delicious food,<br>fast delivery<br>and more.</h2>
            <p>Order anytime. Fresh meals guaranteed.</p>
        </div>

        <div class="login-box" style="position: relative;">
            <a href="index.html" title="Back to Home" style="position: absolute; top: 20px; right: 25px; color: #a0a5b1; font-size: 24px; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#f87e0a'" onmouseout="this.style.color='#a0a5b1'">
                <i class="ri-arrow-left-line"></i>
            </a>
            <h2>Sign In</h2>

            <form id="loginForm">

                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

                <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="username" required />
                
                <div class="password-field">
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required />
                    <i class="ri-eye-off-line toggle-password" id="toggleLoginPassword"></i>
                </div>

                <button type="submit">Sign In</button>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-icons">
                        <a href="404.html" class="social-icon"><i class="ri-google-fill"></i></a>
                        <a href="404.html" class="social-icon"><i class="ri-facebook-fill"></i></a>
                    </div>
                </div>

                <div class="options">
                    <label><input type="checkbox" /> Remember me</label>
                    <a href="404.html">Forgot Password?</a>
                </div>

                <p class="signup-text">
                    New to Stackly Foodie?
                    <a href="signin.html">Sign Up</a>
                </p>

            </form>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('role').value;
            const email = document.getElementById('loginEmail').value;
            
            // Extract name from email and capitalize first letter
            let name = email.split('@')[0];
            name = name.charAt(0).toUpperCase() + name.slice(1);
            
            localStorage.setItem('loggedInUserName', name);
            localStorage.setItem('loggedInUserEmail', email);
            
            if (role === 'admin') {
                window.location.href = 'admindashboard.html';
            } else if (role === 'user') {
                window.location.href = 'userdashboard.html';
            } else {
                alert('Please select a role.');
            }
        });
        
        const togglePassword = document.getElementById('toggleLoginPassword');
        const passwordInput = document.getElementById('loginPassword');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('ri-eye-line');
                this.classList.toggle('ri-eye-off-line');
            });
        }
    </script>

    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
    <!-- Stackly Animations -->
    <script src="js/animations.js" defer></script>
</body>

</html>
